# Nixpacks build configuration for Railway.
#
# Bookvia backend depends on WeasyPrint (Phase 20+ legal-file PDFs and payout
# statements). WeasyPrint is a Python wheel but at runtime it dlopens
# Pango / Cairo / HarfBuzz / FontConfig from the system. Railway's default
# Python image does NOT include these, so we declare them via Nix.
#
# We deliberately leave `aptPkgs` empty to avoid Railway auto-pulling heavy
# apt cascades (libnss3, libwebp7, libopenjp2-7, ...) that caused OOM
# (exit code 137) during the build.

[phases.setup]
aptPkgs = []
nixPkgs = [
  "...",
  "pango",
  "cairo",
  "harfbuzz",
  "fontconfig",
  "gdk-pixbuf",
  "glib",
  "freetype",
  "libffi",
]

[start]
cmd = "uvicorn server:app --host 0.0.0.0 --port ${PORT:-8001}"
